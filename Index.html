<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Me · Fitory</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #1A0F0A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* 배경 노이즈 레이어 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 20% 20%, rgba(212,133,106,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 70% at 85% 80%, rgba(232,168,152,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(242,196,168,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: rise 1s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* 상단 브랜드 영역 */
  .top-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 32px;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 42px;
    color: #F2C4A8;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .name-line {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    font-size: 13px;
    color: rgba(242,196,168,0.5);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  /* QR 카드 */
  .qr-card {
    position: relative;
    width: 260px;
    height: 260px;
    border-radius: 28px;
    background: #FDF8F3;
    padding: 24px;
    box-shadow:
      0 0 0 1px rgba(242,196,168,0.15),
      0 30px 80px rgba(0,0,0,0.5),
      0 0 60px rgba(212,133,106,0.08);
  }

  .qr-card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* 코너 장식 */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: #D4856A;
    border-style: solid;
    opacity: 0.5;
  }
  .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 8px 0 0 0; }
  .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-radius: 0 8px 0 0; }
  .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-radius: 0 0 0 8px; }
  .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 8px 0; }

  /* 하단 텍스트 */
  .bottom-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-top: 32px;
  }

  .scan-text {
    font-family: 'DM Sans', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: rgba(242,196,168,0.4);
    text-transform: uppercase;
  }

  .divider-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(212,133,106,0.4), transparent);
  }

  .role-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    font-size: 12px;
    color: rgba(242,196,168,0.35);
    letter-spacing: 0.15em;
  }

  /* 글로우 효과 */
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,133,106,0.06) 0%, transparent 70%);
    pointer-events: none;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
  }
</style>
</head>
